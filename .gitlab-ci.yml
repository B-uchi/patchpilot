# ─────────────────────────────────────────────────────────────────────────────
# .gitlab-ci.yml  (PatchPilot's OWN pipeline — not the user's project)
#
# This pipeline runs when YOU push to the PatchPilot repo itself.
# It type-checks the code and runs a dry-run self-test using mock SAST data
# so judges can see a live green pipeline on the repo.
#
# CI/CD Variables required on this repo (Settings → CI/CD → Variables):
#   GITLAB_TOKEN      — your personal access token (already set)
#   ANTHROPIC_API_KEY — your Anthropic key
# ─────────────────────────────────────────────────────────────────────────────

image: node:20-alpine

stages:
  - validate
  - test

variables:
  NODE_ENV: test

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - node_modules/

# ── Job 1: TypeScript type-check ─────────────────────────────────────────────
typecheck:
  stage: validate
  script:
    - npm ci --silent
    - npx tsc --noEmit
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'

# ── Job 2: Dry-run self-test ──────────────────────────────────────────────────
# Runs Scout → Fixer → Scribe against mock SAST data.
# DRY_RUN=true means no real branches or MRs are created.
#
# GITLAB_TOKEN and ANTHROPIC_API_KEY come directly from CI/CD Variables —
# GitLab injects them into the environment automatically, no export needed.
# GITLAB_PROJECT_ID and GITLAB_BASE_URL come from GitLab's built-in variables.
dry-run-test:
  stage: test
  script:
    - npm ci --silent
    - apk add --no-cache git --quiet

    # Generate the mock SAST report
    - npx ts-node scripts/seed-mock-scan.ts

    # Set the remaining required vars from GitLab's built-in CI variables,
    # then run the full flow in dry-run mode
    - export GITLAB_PROJECT_ID=$CI_PROJECT_ID
    - export GITLAB_BASE_URL=$CI_SERVER_URL
    - export DRY_RUN=true
    - export MIN_SEVERITY=high
    - npx ts-node flow/index.ts ./scripts/output/mock-sast-report.json
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
  allow_failure: false