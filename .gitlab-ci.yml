# ─────────────────────────────────────────────────────────────────────────────
# .gitlab-ci.yml  (PatchPilot's OWN pipeline — not the user's project)
#
# This pipeline runs when YOU push to the PatchPilot repo itself.
# It type-checks the code and runs a dry-run self-test using the mock
# SAST report so judges can see a live green pipeline on the repo.
# ─────────────────────────────────────────────────────────────────────────────

image: node:20-alpine

stages:
  - validate
  - test

variables:
  NODE_ENV: test

# ── Cache node_modules between runs ────────────────────────────────────────
cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - node_modules/

# ── Job 1: TypeScript type-check ────────────────────────────────────────────
typecheck:
  stage: validate
  script:
    - npm ci --silent
    - npx tsc --noEmit
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'

# ── Job 2: Dry-run self-test ─────────────────────────────────────────────────
# Runs the full Scout → Fixer → Scribe flow against mock data.
# DRY_RUN=true so no real MRs are created.
# ANTHROPIC_API_KEY is a CI variable set on this repo (for demo purposes).
dry-run-test:
  stage: test
  script:
    - npm ci --silent
    - apk add --no-cache git --quiet

    # Generate mock SAST report
    - npx ts-node scripts/seed-mock-scan.ts

    # Run the full flow in dry-run mode
    - |
      export DRY_RUN=true
      export MIN_SEVERITY=high
      export GITLAB_TOKEN=$DEMO_GITLAB_TOKEN
      export GITLAB_PROJECT_ID=$CI_PROJECT_ID
      export GITLAB_BASE_URL=$CI_SERVER_URL
      npx ts-node flow/index.ts ./scripts/mock-sast-report.json
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
  allow_failure: false
